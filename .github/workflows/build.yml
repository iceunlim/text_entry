name: Build Win7 x86_32

on:
  push:
    branches: [ win7-x86 ]
  pull_request:
    branches: [ win7-x86 ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Win7 x86_32
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust 1.77.2 (Win7 compatible)
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: i686-pc-windows-msvc

      - name: Build for Win7 x86 (MSVC)
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Create publish directory
        run: New-Item -ItemType Directory -Path target/publish -Force

      - name: Copy binary to publish directory
        run: Copy-Item target/i686-pc-windows-msvc/release/text_entry.exe target/publish/text_entry-win7-x86.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win7-x86
          path: target/publish/text_entry-win7-x86.exe
