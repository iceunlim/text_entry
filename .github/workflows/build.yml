name: Build All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Linux builds
  build-linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
            artifact_name: text_entry-linux-x86_64-musl
          - arch: arm64
            target: aarch64-unknown-linux-musl
            artifact_name: text_entry-linux-arm64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxft-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Create publish directory
        run: mkdir -p target/publish

      - name: Copy binary to publish directory
        run: cp target/${{ matrix.target }}/release/text_entry target/publish/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: target/publish/${{ matrix.artifact_name }}

  # Windows builds
  build-windows:
    name: Build Windows x86_32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target i686-pc-windows-gnu

      - name: Create publish directory
        run: mkdir -p target/publish

      - name: Copy binary to publish directory
        run: cp target/i686-pc-windows-gnu/release/text_entry.exe target/publish/text_entry-windows-x86.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: target/publish/text_entry-windows-x86.exe

  # macOS builds
  build-macos:
    name: Build macOS Universal Binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update || true
          brew install pkg-config || true

      - name: Install targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create publish directory
        run: mkdir -p target/publish

      - name: Create universal binary
        run: |
          lipo -create -output target/publish/text_entry-macos-universal \
            target/x86_64-apple-darwin/release/text_entry \
            target/aarch64-apple-darwin/release/text_entry

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: target/publish/text_entry-macos-universal

  # Release job
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
