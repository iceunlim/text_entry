name: Build Win7 x86_32

on:
  push:
    branches: [ win7-x86 ]
  pull_request:
    branches: [ win7-x86 ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Win7 x86_32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target i686-pc-windows-gnu

      - name: Create publish directory
        run: mkdir -p target/publish

      - name: Copy binary to publish directory
        run: cp target/i686-pc-windows-gnu/release/text_entry.exe target/publish/text_entry-win7-x86.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win7-x86
          path: target/publish/text_entry-win7-x86.exe
